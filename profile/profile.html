<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>

<body>
    <h1>My Profile</h1>
    <p>This is a simple profile page.</p>
    <form action="">
        <div>
            <input type="hidden" value="id">
        </div>
        <br>
        <div>
            <label for="name">Username</label>
            <input id="name" type="text" required placeholder="Username" name="name">
        </div>
        <br>
        <div>
            <label for="email">Email</label>
            <input id="email" type="email" disabled placeholder="Email" name="email" value="majed@gmail.com">
        </div>
        <br>
        <div>
            <label for="password">Password</label>
            <input id="password" type="password">
        </div>
    </form>
    <div>
        <p>Bio: I am a web developer with a passion for creating beautiful and functional websites.</p>
    </div>
</body>

</html>
